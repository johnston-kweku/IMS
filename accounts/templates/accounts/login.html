{% extends 'base.html' %}

{% block content %}
    <div class="bg-white shadow-2xl p-8 rounded-3xl w-full max-w-md flex flex-col items-center gap-6">
        <div class="w-fit bg-blue-100 p-4 rounded-full flex items-center justify-center">
            <svg class="stroke-2 w-8 h-8 stroke-blue-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
            </svg>
        </div>
        
        <div class="text-center">
            <h1 class="text-3xl font-black text-blue-600 tracking-tight">PHARMAFLOW</h1>
            <p class="text-slate-500 text-sm mt-1 font-medium">Pharmacy Management System</p>
        </div>

        <form method="POST" class="w-full flex flex-col gap-5">
            {% csrf_token %}
            
            <div class="flex flex-col gap-1.5">
                <label for="username" class="text-xs font-bold text-slate-700 uppercase tracking-wider ml-1">Username</label>
                <input type="text" name="username" id="username" placeholder="Enter your username" required
                    class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="password" class="text-xs font-bold text-slate-700 uppercase tracking-wider ml-1">Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required
                    class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all">
            </div>

            <div class="flex flex-col gap-1.5">
                <label for="role" class="text-xs font-bold text-slate-700 uppercase tracking-wider ml-1">Access Role</label>
                <select name="role" id="role" required
                    class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all appearance-none cursor-pointer">
                    <option value="" disabled selected>Select your role</option>
                    <option value="ADMIN">Admin</option>
                    <option value="MANAGER">Manager</option>
                    <option value="WHOLESALER">Wholesaler</option>
                    <option value="RETAILER">Retailer</option>
                </select>
            </div>

            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-200 transition-all transform hover:-translate-y-0.5 active:translate-y-0 mt-2">
                Sign In
            </button>
        </form>
    </div>
{% endblock content %}
